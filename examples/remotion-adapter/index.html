<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Remotion Adapter POC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div
      id="main-canvas"
      data-composition-id="remotion-poc"
      data-width="1920"
      data-height="1080"
      data-duration="5"
    >
      <!--
        Track 0: A native HyperFrames GSAP layer (background gradient)
        This proves GSAP and Remotion adapters coexist.
      -->
      <div
        id="bg-layer"
        class="clip"
        data-start="0"
        data-duration="5"
        data-track-index="0"
        style="position:absolute;top:0;left:0;width:1920px;height:1080px;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);"
      ></div>

      <!--
        Track 1: The Remotion-powered layer.
        React renders into this div based on the current frame.
      -->
      <div
        id="remotion-layer"
        class="clip"
        data-start="0"
        data-duration="5"
        data-track-index="1"
        style="position:absolute;top:0;left:0;width:1920px;height:1080px;"
      >
        <div id="remotion-root" style="width:1920px;height:1080px;"></div>
      </div>

      <!--
        Track 2: A native HyperFrames text overlay (GSAP animated)
        Shows both systems rendering in the same composition.
      -->
      <div
        id="hf-overlay"
        class="clip"
        data-start="0"
        data-duration="5"
        data-track-index="2"
        style="position:absolute;bottom:60px;left:0;width:1920px;text-align:center;"
      >
        <div id="hf-overlay-inner" style="opacity:0;">
          <span style="font-family:system-ui,sans-serif;font-size:28px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;">
            GSAP + REMOTION COEXISTING IN HYPERFRAMES
          </span>
        </div>
      </div>

      <!-- GSAP timeline for the native HyperFrames layers -->
      <script>
        const tl = gsap.timeline({ paused: true });

        // Background pulse
        tl.fromTo('#bg-layer',
          { background: 'linear-gradient(135deg, #0a0a0a, #1a1a2e)' },
          { background: 'linear-gradient(135deg, #1a1a2e, #16213e)', duration: 5, ease: 'none' },
          0
        );

        // Overlay fade in (target inner wrapper, not the clip element)
        tl.fromTo('#hf-overlay-inner',
          { opacity: 0, y: 20 },
          { opacity: 1, y: 0, duration: 1, ease: 'power2.out' },
          0.5
        );

        window.__timelines = window.__timelines || {};
        window.__timelines['remotion-poc'] = tl;
      </script>

      <!--
        Remotion-style React component.

        This simulates exactly what a real Remotion composition does:
        - A React component that receives `currentFrame` and `fps`
        - Renders differently based on the frame number
        - Uses interpolate() to drive animations

        In a real integration, this would be a bundled Remotion component.
      -->
      <script>
        // ── Remotion-like primitives (what @remotion/core provides) ──────────
        const { createElement: h, useState, useEffect, useCallback } = React;

        // Remotion's interpolate() — maps a frame range to an output range
        function interpolate(frame, inputRange, outputRange, options) {
          const { extrapolateLeft = 'clamp', extrapolateRight = 'clamp' } = options || {};
          let i = 0;
          for (i = 0; i < inputRange.length - 1; i++) {
            if (frame <= inputRange[i + 1]) break;
          }
          i = Math.min(i, inputRange.length - 2);

          const inputLow = inputRange[i];
          const inputHigh = inputRange[i + 1];
          const outputLow = outputRange[i];
          const outputHigh = outputRange[i + 1];

          let t = (frame - inputLow) / (inputHigh - inputLow);

          if (extrapolateLeft === 'clamp') t = Math.max(0, t);
          if (extrapolateRight === 'clamp') t = Math.min(1, t);

          return outputLow + t * (outputHigh - outputLow);
        }

        // Remotion's spring() — simplified spring animation
        function spring(config) {
          const { frame, fps = 30, from = 0, to = 1, durationInFrames = 30 } = config;
          const progress = Math.min(1, frame / durationInFrames);
          // Damped spring approximation
          const value = 1 - Math.exp(-6 * progress) * Math.cos(8 * progress * Math.PI);
          return from + (to - from) * Math.min(1, Math.max(0, value));
        }

        // ── The actual "Remotion composition" ─────────────────────────────────
        // This is what a Remotion user would write. It's a pure React component
        // that receives the current frame and computes everything from it.

        const FPS = 30;
        const DURATION_IN_FRAMES = 150; // 5 seconds at 30fps

        function RemotionDemo({ currentFrame }) {
          const fps = FPS;

          // Title animation (frames 0-30: spring in)
          const titleScale = spring({
            frame: currentFrame,
            fps,
            from: 0,
            to: 1,
            durationInFrames: 25,
          });
          const titleOpacity = interpolate(currentFrame, [0, 15], [0, 1]);

          // Subtitle (frames 20-50: fade in from below)
          const subtitleOpacity = interpolate(currentFrame, [20, 40], [0, 1]);
          const subtitleY = interpolate(currentFrame, [20, 40], [30, 0]);

          // Rotating ring
          const rotation = interpolate(currentFrame, [0, DURATION_IN_FRAMES], [0, 360]);

          // Counter (frames 30-90: count from 0 to 100)
          const count = Math.round(interpolate(currentFrame, [30, 90], [0, 100]));

          // Color shift over time
          const hue = interpolate(currentFrame, [0, DURATION_IN_FRAMES], [220, 320]);

          // Exit animation (frames 120-150: fade out)
          const exitOpacity = interpolate(currentFrame, [120, DURATION_IN_FRAMES], [1, 0]);

          const containerStyle = {
            width: '100%',
            height: '100%',
            display: 'flex',
            flexDirection: 'column',
            justifyContent: 'center',
            alignItems: 'center',
            fontFamily: 'system-ui, -apple-system, sans-serif',
            opacity: exitOpacity,
          };

          const ringStyle = {
            width: 200,
            height: 200,
            borderRadius: '50%',
            border: `4px solid hsl(${hue}, 70%, 60%)`,
            borderTopColor: 'transparent',
            transform: `rotate(${rotation}deg)`,
            position: 'absolute',
          };

          const titleStyle = {
            fontSize: 72,
            fontWeight: 800,
            color: '#ffffff',
            transform: `scale(${titleScale})`,
            opacity: titleOpacity,
            letterSpacing: '-0.02em',
            marginBottom: 16,
          };

          const subtitleStyle = {
            fontSize: 32,
            color: `hsl(${hue}, 70%, 70%)`,
            opacity: subtitleOpacity,
            transform: `translateY(${subtitleY}px)`,
          };

          const counterStyle = {
            fontSize: 120,
            fontWeight: 900,
            color: `hsl(${hue}, 70%, 60%)`,
            position: 'absolute',
            fontVariantNumeric: 'tabular-nums',
          };

          const frameStyle = {
            position: 'absolute',
            top: 40,
            right: 60,
            fontSize: 18,
            color: 'rgba(255,255,255,0.3)',
            fontFamily: 'monospace',
          };

          return h('div', { style: containerStyle },
            h('div', { style: { position: 'relative', display: 'flex', justifyContent: 'center', alignItems: 'center', marginBottom: 40 } },
              h('div', { style: ringStyle }),
              h('div', { style: counterStyle }, count),
            ),
            h('div', { style: titleStyle }, 'Remotion + HyperFrames'),
            h('div', { style: subtitleStyle }, 'React components as frame adapters'),
            h('div', { style: frameStyle }, `frame ${currentFrame}/${DURATION_IN_FRAMES}`),
          );
        }

        // ── Mount and register with HyperFrames adapter ───────────────────────
        // This is the bridge code that connects React to HyperFrames' seek system.

        const root = ReactDOM.createRoot(document.getElementById('remotion-root'));
        let _currentFrame = 0;

        function renderAtFrame(frame) {
          _currentFrame = frame;
          root.render(h(RemotionDemo, { currentFrame: frame }));
        }

        // Initial render at frame 0
        renderAtFrame(0);

        // Register with HyperFrames' Remotion adapter
        window.__hfRemotion = window.__hfRemotion || [];
        window.__hfRemotion.push({
          seekTo: (frame) => {
            renderAtFrame(frame);
          },
          pause: () => {
            // React is already frame-static — no-op
          },
          durationInFrames: DURATION_IN_FRAMES,
          fps: FPS,
        });
      </script>
    </div>
  </body>
</html>
