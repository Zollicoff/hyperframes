<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Modern Fast Promo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #111111;
        overflow: hidden;
        width: 1920px;
        height: 1080px;
      }
      #main-composition {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #111111;
        overflow: hidden;
      }
      #scene01-host,
      #scene02-host,
      #scene03-host,
      #scene04-host {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
      }
    </style>
  </head>
  <body>
    <div
      id="main-composition"
      data-composition-id="render"
      data-width="1920"
      data-height="1080"
      data-duration="22"
    >
      <div
        id="scene01-host"
        data-composition-id="scene-01"
        data-composition-src="compositions/scene-01.html"
        data-start="0"
        data-duration="6.57"
        data-track-index="0"
      ></div>

      <div
        id="scene02-host"
        data-composition-id="scene-02"
        data-composition-src="compositions/scene-02.html"
        data-start="5.87"
        data-duration="3.14"
        data-track-index="1"
      ></div>

      <div
        id="scene03-host"
        data-composition-id="scene-03"
        data-composition-src="compositions/scene-03.html"
        data-start="8.64"
        data-duration="4.13"
        data-track-index="2"
      ></div>

      <div
        id="scene04-host"
        data-composition-id="scene-04"
        data-composition-src="compositions/scene-04.html"
        data-start="15.45"
        data-duration="5.35"
        data-track-index="3"
      ></div>

      <script>
        window.__timelines = window.__timelines || {};
        var tl = gsap.timeline({ paused: true });
        /* Scene transitions — fade between scenes at overlap points */
        tl.to("#scene01-host", { opacity: 0, duration: 0.3 }, 6.27);
        tl.to("#scene02-host", { opacity: 0, duration: 0.3 }, 8.71);
        tl.to("#scene03-host", { opacity: 0, duration: 0.3 }, 12.47);
        tl.to("#scene04-host", { opacity: 0, duration: 0.3 }, 20.5);
        window.__timelines["render"] = tl;
        /* Expose root timeline as __timeline so the studio player uses it
           (studio picks the last key of __timelines which would be a sub-comp) */
        window.__timeline = tl;
      </script>
    </div>
  </body>
</html>
