<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GSAP Plugin Showcase</title>
    <!-- GSAP Core -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <!-- GSAP Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/MotionPathPlugin.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomEase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomBounce.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/CustomWiggle.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap");
      body, html {
        margin: 0; padding: 0;
        background: #0a0a0a; overflow: hidden;
        width: 1920px; height: 1080px;
      }
      #root {
        position: relative;
        width: 1920px; height: 1080px;
        background: #0a0a0a; overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="plugin-showcase"
      data-width="1920" data-height="1080" data-duration="20">

      <!-- ═══ Section 1: CustomEase + CustomBounce (0-5s) ═══ -->
      <div id="section-ease" data-start="0" data-duration="5" data-track-index="0"
        style="position:absolute;top:0;left:0;width:1920px;height:1080px;">

        <!-- Title -->
        <div class="ease-title" style="position:absolute;top:80px;left:0;width:1920px;text-align:center;font-family:'Inter',sans-serif;font-weight:900;font-size:48px;color:#fff;opacity:0;">
          CustomEase + CustomBounce
        </div>

        <!-- Bouncing ball -->
        <div class="bounce-ball" style="position:absolute;top:250px;left:910px;width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg, #ff6b6b, #ee5a24);opacity:0;"></div>

        <!-- Ease curve visualization (decorative bars) -->
        <div class="ease-bars" style="position:absolute;bottom:100px;left:260px;display:flex;gap:12px;align-items:flex-end;">
          <div class="bar bar-1" style="width:40px;height:0;background:#ff6b6b;border-radius:4px;"></div>
          <div class="bar bar-2" style="width:40px;height:0;background:#ff8e53;border-radius:4px;"></div>
          <div class="bar bar-3" style="width:40px;height:0;background:#ffbe76;border-radius:4px;"></div>
          <div class="bar bar-4" style="width:40px;height:0;background:#f9ca24;border-radius:4px;"></div>
          <div class="bar bar-5" style="width:40px;height:0;background:#6ab04c;border-radius:4px;"></div>
          <div class="bar bar-6" style="width:40px;height:0;background:#22a6b3;border-radius:4px;"></div>
          <div class="bar bar-7" style="width:40px;height:0;background:#4834d4;border-radius:4px;"></div>
          <div class="bar bar-8" style="width:40px;height:0;background:#be2edd;border-radius:4px;"></div>
          <div class="bar bar-9" style="width:40px;height:0;background:#eb4d4b;border-radius:4px;"></div>
          <div class="bar bar-10" style="width:40px;height:0;background:#7ed6df;border-radius:4px;"></div>
          <div class="bar bar-11" style="width:40px;height:0;background:#e056fd;border-radius:4px;"></div>
          <div class="bar bar-12" style="width:40px;height:0;background:#686de0;border-radius:4px;"></div>
          <div class="bar bar-13" style="width:40px;height:0;background:#30336b;border-radius:4px;"></div>
          <div class="bar bar-14" style="width:40px;height:0;background:#95afc0;border-radius:4px;"></div>
          <div class="bar bar-15" style="width:40px;height:0;background:#f19066;border-radius:4px;"></div>
          <div class="bar bar-16" style="width:40px;height:0;background:#c7ecee;border-radius:4px;"></div>
          <div class="bar bar-17" style="width:40px;height:0;background:#dff9fb;border-radius:4px;"></div>
          <div class="bar bar-18" style="width:40px;height:0;background:#badc58;border-radius:4px;"></div>
          <div class="bar bar-19" style="width:40px;height:0;background:#ff7979;border-radius:4px;"></div>
          <div class="bar bar-20" style="width:40px;height:0;background:#7ed6df;border-radius:4px;"></div>
        </div>
      </div>

      <!-- ═══ Section 2: MotionPathPlugin (5-10s) ═══ -->
      <div id="section-motion" data-start="5" data-duration="5" data-track-index="1"
        style="position:absolute;top:0;left:0;width:1920px;height:1080px;opacity:0;">

        <div class="motion-title" style="position:absolute;top:80px;left:0;width:1920px;text-align:center;font-family:'Inter',sans-serif;font-weight:900;font-size:48px;color:#fff;opacity:0;">
          MotionPathPlugin
        </div>

        <!-- SVG path for motion -->
        <svg viewBox="0 0 1920 1080" style="position:absolute;top:0;left:0;width:1920px;height:1080px;">
          <path id="orbit-path" d="M 960,300 C 1400,300 1500,800 960,800 C 420,800 520,300 960,300" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" stroke-dasharray="8,8"/>
        </svg>

        <!-- Orbiting element -->
        <div class="orbiter" style="position:absolute;top:280px;left:940px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg, #a29bfe, #6c5ce7);box-shadow:0 0 30px rgba(108,92,231,0.6);opacity:0;"></div>

        <!-- Trail dots -->
        <div class="trail-dot trail-1" style="position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(162,155,254,0.3);opacity:0;"></div>
        <div class="trail-dot trail-2" style="position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(162,155,254,0.2);opacity:0;"></div>
        <div class="trail-dot trail-3" style="position:absolute;width:10px;height:10px;border-radius:50%;background:rgba(162,155,254,0.1);opacity:0;"></div>
      </div>

      <!-- ═══ Section 3: CustomWiggle (10-15s) ═══ -->
      <div id="section-wiggle" data-start="10" data-duration="5" data-track-index="2"
        style="position:absolute;top:0;left:0;width:1920px;height:1080px;opacity:0;">

        <div class="wiggle-title" style="position:absolute;top:80px;left:0;width:1920px;text-align:center;font-family:'Inter',sans-serif;font-weight:900;font-size:48px;color:#fff;opacity:0;">
          CustomWiggle
        </div>

        <!-- Wiggling elements -->
        <div class="wiggle-box wiggle-1" style="position:absolute;top:350px;left:360px;width:200px;height:200px;border-radius:24px;background:linear-gradient(135deg, #fd79a8, #e84393);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:700;font-size:20px;color:#fff;opacity:0;">Wiggly</div>
        <div class="wiggle-box wiggle-2" style="position:absolute;top:350px;left:660px;width:200px;height:200px;border-radius:24px;background:linear-gradient(135deg, #55efc4, #00b894);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:700;font-size:20px;color:#fff;opacity:0;">Wobbly</div>
        <div class="wiggle-box wiggle-3" style="position:absolute;top:350px;left:960px;width:200px;height:200px;border-radius:24px;background:linear-gradient(135deg, #74b9ff, #0984e3);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:700;font-size:20px;color:#fff;opacity:0;">Jittery</div>
        <div class="wiggle-box wiggle-4" style="position:absolute;top:350px;left:1260px;width:200px;height:200px;border-radius:24px;background:linear-gradient(135deg, #ffeaa7, #fdcb6e);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:700;font-size:20px;color:#333;opacity:0;">Shaky</div>
      </div>

      <!-- ═══ Section 4: All Plugins Combined (15-20s) ═══ -->
      <div id="section-combined" data-start="15" data-duration="5" data-track-index="3"
        style="position:absolute;top:0;left:0;width:1920px;height:1080px;opacity:0;">

        <div class="combined-title" style="position:absolute;top:80px;left:0;width:1920px;text-align:center;font-family:'Inter',sans-serif;font-weight:900;font-size:48px;color:#fff;opacity:0;">
          All Together Now
        </div>

        <!-- Central element that uses everything -->
        <div class="hero-ring" style="position:absolute;top:340px;left:760px;width:400px;height:400px;border:4px solid rgba(255,255,255,0.2);border-radius:50%;opacity:0;"></div>
        <div class="hero-dot" style="position:absolute;top:520px;left:940px;width:40px;height:40px;border-radius:50%;background:#fff;opacity:0;"></div>

        <!-- Particles -->
        <div class="particle p-1" style="position:absolute;top:540px;left:960px;width:8px;height:8px;border-radius:50%;background:#ff6b6b;opacity:0;"></div>
        <div class="particle p-2" style="position:absolute;top:540px;left:960px;width:8px;height:8px;border-radius:50%;background:#6c5ce7;opacity:0;"></div>
        <div class="particle p-3" style="position:absolute;top:540px;left:960px;width:8px;height:8px;border-radius:50%;background:#00b894;opacity:0;"></div>
        <div class="particle p-4" style="position:absolute;top:540px;left:960px;width:8px;height:8px;border-radius:50%;background:#fdcb6e;opacity:0;"></div>
        <div class="particle p-5" style="position:absolute;top:540px;left:960px;width:8px;height:8px;border-radius:50%;background:#e84393;opacity:0;"></div>
        <div class="particle p-6" style="position:absolute;top:540px;left:960px;width:8px;height:8px;border-radius:50%;background:#0984e3;opacity:0;"></div>
      </div>
    </div>

    <script>
      /* Register all plugins */
      gsap.registerPlugin(MotionPathPlugin, CustomEase, CustomBounce, CustomWiggle);

      /* Create custom eases */
      CustomEase.create("smoothSnap", "M0,0 C0.14,0 0.27,0.58 0.32,0.72 0.42,1 0.62,1 1,1");
      CustomBounce.create("gentleBounce", { strength: 0.4, squash: 2 });
      CustomWiggle.create("funkyWiggle", { wiggles: 8, type: "easeOut" });
      CustomWiggle.create("subtleWiggle", { wiggles: 5, type: "uniform" });
      CustomWiggle.create("randomWiggle", { wiggles: 12, type: "random" });

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ═══ Section 1: CustomEase + CustomBounce (0-5s) ═══ */

      /* Fade in title */
      tl.to(".ease-title", { opacity: 1, y: -20, duration: 0.6, ease: "smoothSnap" }, 0.2);

      /* Bounce ball drops in */
      tl.set(".bounce-ball", { opacity: 1 }, 0.5);
      tl.to(".bounce-ball", { y: 400, duration: 1.5, ease: "gentleBounce" }, 0.5);

      /* Bars animate up with custom ease — stagger using position parameter */
      tl.to(".bar-1", { height: 120, duration: 0.4, ease: "smoothSnap" }, 1.0);
      tl.to(".bar-2", { height: 200, duration: 0.4, ease: "smoothSnap" }, 1.05);
      tl.to(".bar-3", { height: 160, duration: 0.4, ease: "smoothSnap" }, 1.1);
      tl.to(".bar-4", { height: 280, duration: 0.4, ease: "smoothSnap" }, 1.15);
      tl.to(".bar-5", { height: 220, duration: 0.4, ease: "smoothSnap" }, 1.2);
      tl.to(".bar-6", { height: 340, duration: 0.4, ease: "smoothSnap" }, 1.25);
      tl.to(".bar-7", { height: 180, duration: 0.4, ease: "smoothSnap" }, 1.3);
      tl.to(".bar-8", { height: 400, duration: 0.4, ease: "smoothSnap" }, 1.35);
      tl.to(".bar-9", { height: 300, duration: 0.4, ease: "smoothSnap" }, 1.4);
      tl.to(".bar-10", { height: 150, duration: 0.4, ease: "smoothSnap" }, 1.45);
      tl.to(".bar-11", { height: 360, duration: 0.4, ease: "smoothSnap" }, 1.5);
      tl.to(".bar-12", { height: 250, duration: 0.4, ease: "smoothSnap" }, 1.55);
      tl.to(".bar-13", { height: 190, duration: 0.4, ease: "smoothSnap" }, 1.6);
      tl.to(".bar-14", { height: 310, duration: 0.4, ease: "smoothSnap" }, 1.65);
      tl.to(".bar-15", { height: 140, duration: 0.4, ease: "smoothSnap" }, 1.7);
      tl.to(".bar-16", { height: 270, duration: 0.4, ease: "smoothSnap" }, 1.75);
      tl.to(".bar-17", { height: 380, duration: 0.4, ease: "smoothSnap" }, 1.8);
      tl.to(".bar-18", { height: 210, duration: 0.4, ease: "smoothSnap" }, 1.85);
      tl.to(".bar-19", { height: 330, duration: 0.4, ease: "smoothSnap" }, 1.9);
      tl.to(".bar-20", { height: 170, duration: 0.4, ease: "smoothSnap" }, 1.95);

      /* Fade out section 1 */
      tl.to("#section-ease", { opacity: 0, duration: 0.4 }, 4.5);

      /* ═══ Section 2: MotionPathPlugin (5-10s) ═══ */

      tl.to("#section-motion", { opacity: 1, duration: 0.3 }, 5.0);
      tl.to(".motion-title", { opacity: 1, y: -20, duration: 0.6, ease: "smoothSnap" }, 5.2);

      /* Orbiter appears */
      tl.set(".orbiter", { opacity: 1 }, 5.5);

      /* Orbit along path */
      tl.to(".orbiter", {
        motionPath: {
          path: "#orbit-path",
          align: "#orbit-path",
          alignOrigin: [0.5, 0.5],
          autoRotate: false
        },
        duration: 3.5,
        ease: "none"
      }, 5.5);

      /* Trail dots follow with delay */
      tl.set(".trail-1", { opacity: 1 }, 5.8);
      tl.to(".trail-1", {
        motionPath: { path: "#orbit-path", align: "#orbit-path", alignOrigin: [0.5, 0.5] },
        duration: 3.2, ease: "none"
      }, 5.8);

      tl.set(".trail-2", { opacity: 1 }, 6.1);
      tl.to(".trail-2", {
        motionPath: { path: "#orbit-path", align: "#orbit-path", alignOrigin: [0.5, 0.5] },
        duration: 2.9, ease: "none"
      }, 6.1);

      tl.set(".trail-3", { opacity: 1 }, 6.4);
      tl.to(".trail-3", {
        motionPath: { path: "#orbit-path", align: "#orbit-path", alignOrigin: [0.5, 0.5] },
        duration: 2.6, ease: "none"
      }, 6.4);

      /* Fade out section 2 */
      tl.to("#section-motion", { opacity: 0, duration: 0.4 }, 9.5);

      /* ═══ Section 3: CustomWiggle (10-15s) ═══ */

      tl.to("#section-wiggle", { opacity: 1, duration: 0.3 }, 10.0);
      tl.to(".wiggle-title", { opacity: 1, y: -20, duration: 0.6, ease: "smoothSnap" }, 10.2);

      /* Boxes pop in */
      tl.to(".wiggle-1", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out" }, 10.5);
      tl.to(".wiggle-2", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out" }, 10.7);
      tl.to(".wiggle-3", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out" }, 10.9);
      tl.to(".wiggle-4", { opacity: 1, scale: 1, duration: 0.4, ease: "back.out" }, 11.1);

      /* Each box wiggles with a different custom wiggle */
      tl.to(".wiggle-1", { rotation: 15, duration: 2, ease: "funkyWiggle" }, 11.5);
      tl.to(".wiggle-2", { x: 30, duration: 2, ease: "subtleWiggle" }, 11.5);
      tl.to(".wiggle-3", { y: 20, duration: 2, ease: "randomWiggle" }, 11.5);
      tl.to(".wiggle-4", { scale: 1.15, duration: 2, ease: "funkyWiggle" }, 11.5);

      /* Fade out section 3 */
      tl.to("#section-wiggle", { opacity: 0, duration: 0.4 }, 14.5);

      /* ═══ Section 4: All Together (15-20s) ═══ */

      tl.to("#section-combined", { opacity: 1, duration: 0.3 }, 15.0);
      tl.to(".combined-title", { opacity: 1, y: -20, duration: 0.6, ease: "smoothSnap" }, 15.2);

      /* Ring scales in with bounce */
      tl.set(".hero-ring", { opacity: 1, scale: 0 }, 15.5);
      tl.to(".hero-ring", { scale: 1, duration: 1, ease: "gentleBounce" }, 15.5);

      /* Central dot appears */
      tl.set(".hero-dot", { opacity: 1 }, 15.8);
      tl.to(".hero-dot", { scale: 1.5, duration: 0.5, ease: "smoothSnap" }, 15.8);

      /* Ring wiggles rotation */
      tl.to(".hero-ring", { rotation: 10, duration: 2, ease: "funkyWiggle" }, 16.5);

      /* Particles burst out along paths */
      tl.set(".p-1", { opacity: 1 }, 16.0);
      tl.to(".p-1", { x: -200, y: -150, scale: 0, duration: 1.5, ease: "smoothSnap" }, 16.0);
      tl.set(".p-2", { opacity: 1 }, 16.1);
      tl.to(".p-2", { x: 200, y: -120, scale: 0, duration: 1.5, ease: "smoothSnap" }, 16.1);
      tl.set(".p-3", { opacity: 1 }, 16.2);
      tl.to(".p-3", { x: -180, y: 160, scale: 0, duration: 1.5, ease: "smoothSnap" }, 16.2);
      tl.set(".p-4", { opacity: 1 }, 16.3);
      tl.to(".p-4", { x: 220, y: 130, scale: 0, duration: 1.5, ease: "smoothSnap" }, 16.3);
      tl.set(".p-5", { opacity: 1 }, 16.4);
      tl.to(".p-5", { x: -50, y: -220, scale: 0, duration: 1.5, ease: "smoothSnap" }, 16.4);
      tl.set(".p-6", { opacity: 1 }, 16.5);
      tl.to(".p-6", { x: 60, y: 200, scale: 0, duration: 1.5, ease: "smoothSnap" }, 16.5);

      /* Final fade out */
      tl.to("#section-combined", { opacity: 0, duration: 0.8 }, 19.0);

      window.__timelines["plugin-showcase"] = tl;
    </script>
  </body>
</html>
