<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>APEX Fitness Tracker - Rise Above</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

  .composition {
    background: #000;
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    color: #fff;
  }

  /* ── Phase 1: Product Beauty Shots ── */
  .product-stage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
  }

  .product-glow {
    position: absolute; width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.25) 0%, rgba(212,175,55,0) 70%);
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    opacity: 0;
  }

  .product-body {
    position: relative; width: 260px; height: 340px;
    opacity: 0;
  }

  .watch-case {
    position: absolute; top: 40px; left: 30px;
    width: 200px; height: 240px;
    border-radius: 50px;
    background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 50%, #1a1a1a 100%);
    border: 2px solid rgba(212,175,55,0.6);
    box-shadow: 0 0 40px rgba(212,175,55,0.15), inset 0 0 30px rgba(0,0,0,0.8);
  }

  .watch-screen {
    position: absolute; top: 65px; left: 55px;
    width: 150px; height: 190px;
    border-radius: 35px;
    background: linear-gradient(180deg, #0a0a0a 0%, #111 100%);
    overflow: hidden;
  }

  .screen-content {
    position: absolute; top: 20px; left: 15px; width: 120px;
    text-align: center;
  }

  .screen-time {
    font-size: 42px; font-weight: 200; letter-spacing: 2px;
    color: #D4AF37; opacity: 0;
  }

  .screen-hr {
    font-size: 14px; color: rgba(212,175,55,0.7); margin-top: 8px;
    letter-spacing: 1px; opacity: 0;
  }

  .screen-hr-value {
    font-size: 28px; font-weight: 300; color: #D4AF37; opacity: 0;
  }

  .watch-crown {
    position: absolute; top: 130px; right: 20px;
    width: 12px; height: 35px;
    border-radius: 6px;
    background: linear-gradient(180deg, #D4AF37, #8B7225, #D4AF37);
    box-shadow: 2px 0 8px rgba(212,175,55,0.3);
  }

  .watch-band-top, .watch-band-bottom {
    position: absolute; left: 70px; width: 120px; height: 60px;
    background: linear-gradient(180deg, #1a1a1a, #111);
    border: 1px solid rgba(212,175,55,0.15);
  }

  .watch-band-top {
    top: -15px; border-radius: 10px 10px 0 0;
  }

  .watch-band-bottom {
    bottom: -15px; border-radius: 0 0 10px 10px;
  }

  .product-name-reveal {
    position: absolute; top: 480px; left: 50%; transform: translateX(-50%);
    font-size: 72px; font-weight: 100; letter-spacing: 30px;
    color: #D4AF37; opacity: 0;
    text-transform: uppercase;
  }

  .product-tagline-small {
    position: absolute; top: 560px; left: 50%; transform: translateX(-50%);
    font-size: 16px; font-weight: 300; letter-spacing: 8px;
    color: rgba(255,255,255,0.5); opacity: 0;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Gold accent lines */
  .gold-line {
    position: absolute; height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37, transparent);
    opacity: 0;
  }
  .gold-line-1 { top: 200px; left: 0; width: 100%; }
  .gold-line-2 { bottom: 200px; left: 0; width: 100%; }
  .gold-line-left { top: 0; left: 300px; width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent, #D4AF37, transparent); }
  .gold-line-right { top: 0; right: 300px; width: 1px; height: 100%;
    background: linear-gradient(180deg, transparent, #D4AF37, transparent); }

  /* ── Phase 2: Spec Highlights ── */
  .spec-panel {
    position: absolute; opacity: 0;
    padding: 20px 30px;
    border-left: 2px solid #D4AF37;
  }

  .spec-label {
    font-size: 11px; font-weight: 400; letter-spacing: 4px;
    color: rgba(212,175,55,0.6); text-transform: uppercase;
    margin-bottom: 6px;
  }

  .spec-value {
    font-size: 36px; font-weight: 200; color: #fff;
    letter-spacing: 2px;
  }

  .spec-1 { top: 300px; left: 160px; }
  .spec-2 { top: 300px; right: 160px; text-align: right; border-left: none; border-right: 2px solid #D4AF37; }
  .spec-3 { top: 500px; left: 160px; }
  .spec-4 { top: 500px; right: 160px; text-align: right; border-left: none; border-right: 2px solid #D4AF37; }

  /* ── Phase 3: Athletes in Motion ── */
  .athlete-stage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0; overflow: hidden;
  }

  .athlete-panel {
    position: absolute; top: 0; height: 100%;
    overflow: hidden; opacity: 0;
  }

  .athlete-panel-1 { left: 0; width: 33.33%; }
  .athlete-panel-2 { left: 33.33%; width: 33.34%; }
  .athlete-panel-3 { left: 66.67%; width: 33.33%; }

  .athlete-silhouette {
    position: absolute; bottom: 0; width: 100%; height: 85%;
    display: flex; align-items: flex-end; justify-content: center;
  }

  /* Runner silhouette */
  .runner-figure {
    position: relative; width: 200px; height: 400px;
  }

  .runner-torso {
    position: absolute; top: 40px; left: 80px;
    width: 40px; height: 120px;
    background: linear-gradient(180deg, #D4AF37, #8B7225);
    border-radius: 20px;
    transform: rotate(-15deg);
  }

  .runner-head {
    position: absolute; top: 0; left: 82px;
    width: 36px; height: 36px;
    background: #D4AF37; border-radius: 50%;
  }

  .runner-leg-front {
    position: absolute; top: 140px; left: 60px;
    width: 20px; height: 160px;
    background: linear-gradient(180deg, #B8962E, #8B7225);
    border-radius: 10px;
    transform: rotate(25deg); transform-origin: top center;
  }

  .runner-leg-back {
    position: absolute; top: 140px; left: 110px;
    width: 20px; height: 160px;
    background: linear-gradient(180deg, #8B7225, #5C4C19);
    border-radius: 10px;
    transform: rotate(-30deg); transform-origin: top center;
  }

  .runner-arm-front {
    position: absolute; top: 50px; left: 50px;
    width: 16px; height: 110px;
    background: linear-gradient(180deg, #D4AF37, #8B7225);
    border-radius: 8px;
    transform: rotate(-35deg); transform-origin: top center;
  }

  .runner-arm-back {
    position: absolute; top: 50px; left: 120px;
    width: 16px; height: 110px;
    background: linear-gradient(180deg, #8B7225, #5C4C19);
    border-radius: 8px;
    transform: rotate(25deg); transform-origin: top center;
  }

  /* Cyclist silhouette */
  .cyclist-figure {
    position: relative; width: 280px; height: 300px;
  }

  .bike-wheel-front, .bike-wheel-back {
    position: absolute; bottom: 0;
    width: 120px; height: 120px;
    border: 3px solid #D4AF37; border-radius: 50%;
  }
  .bike-wheel-back { left: 0; }
  .bike-wheel-front { right: 0; }

  .bike-frame {
    position: absolute; bottom: 40px; left: 55px;
    width: 170px; height: 100px;
  }

  .bike-frame-line {
    position: absolute; background: #B8962E; border-radius: 2px;
  }
  .frame-top { top: 0; left: 0; width: 170px; height: 4px; transform: rotate(-10deg); }
  .frame-down { top: 0; left: 0; width: 4px; height: 100px; transform: rotate(15deg); }
  .frame-seat { top: 0; right: 20px; width: 4px; height: 100px; transform: rotate(-5deg); }

  .cyclist-body {
    position: absolute; bottom: 140px; left: 80px;
    width: 30px; height: 90px;
    background: linear-gradient(180deg, #D4AF37, #8B7225);
    border-radius: 15px;
    transform: rotate(-25deg);
  }

  .cyclist-head {
    position: absolute; bottom: 225px; left: 65px;
    width: 30px; height: 30px;
    background: #D4AF37; border-radius: 50%;
  }

  /* Lifter silhouette */
  .lifter-figure {
    position: relative; width: 260px; height: 380px;
  }

  .lifter-torso {
    position: absolute; top: 50px; left: 90px;
    width: 80px; height: 140px;
    background: linear-gradient(180deg, #D4AF37, #8B7225);
    border-radius: 20px;
  }

  .lifter-head {
    position: absolute; top: 5px; left: 110px;
    width: 40px; height: 40px;
    background: #D4AF37; border-radius: 50%;
  }

  .barbell {
    position: absolute; top: 30px; left: 10px;
    width: 240px; height: 6px;
    background: linear-gradient(90deg, #888, #D4AF37, #888);
    border-radius: 3px;
  }

  .barbell-plate-left, .barbell-plate-right {
    position: absolute; top: 15px;
    width: 14px; height: 50px;
    background: #D4AF37; border-radius: 4px;
  }
  .barbell-plate-left { left: 5px; }
  .barbell-plate-right { right: 5px; }

  .lifter-leg-left, .lifter-leg-right {
    position: absolute; top: 180px; width: 30px; height: 150px;
    background: linear-gradient(180deg, #B8962E, #8B7225);
    border-radius: 15px;
  }
  .lifter-leg-left { left: 90px; }
  .lifter-leg-right { left: 140px; }

  /* Panel dividers */
  .panel-divider {
    position: absolute; top: 0; width: 2px; height: 100%;
    background: linear-gradient(180deg, transparent, #D4AF37, transparent);
    opacity: 0; z-index: 10;
  }
  .panel-divider-1 { left: 33.33%; }
  .panel-divider-2 { left: 66.67%; }

  .athlete-label {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    font-size: 14px; font-weight: 300; letter-spacing: 6px;
    color: rgba(255,255,255,0.6); text-transform: uppercase;
    white-space: nowrap; opacity: 0;
  }

  /* Motion lines behind athletes */
  .motion-line {
    position: absolute; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.4), transparent);
    opacity: 0;
  }

  /* ── Phase 4: Data Visualization / Pulse ── */
  .data-stage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0;
  }

  .pulse-ring {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 50%;
    opacity: 0;
  }

  .pulse-ring-1 { width: 200px; height: 200px; }
  .pulse-ring-2 { width: 400px; height: 400px; }
  .pulse-ring-3 { width: 600px; height: 600px; }
  .pulse-ring-4 { width: 800px; height: 800px; }
  .pulse-ring-5 { width: 1000px; height: 1000px; }

  .heartbeat-line {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 200px;
    opacity: 0;
  }

  .heartbeat-line svg { width: 100%; height: 100%; }
  .heartbeat-path { fill: none; stroke: #D4AF37; stroke-width: 2; }

  .stat-counter {
    position: absolute; text-align: center; opacity: 0;
  }

  .stat-number {
    font-size: 64px; font-weight: 100; color: #D4AF37;
    letter-spacing: 4px;
  }

  .stat-unit {
    font-size: 14px; font-weight: 300; letter-spacing: 4px;
    color: rgba(255,255,255,0.5); text-transform: uppercase;
    margin-top: 4px;
  }

  .stat-bpm { top: 350px; left: 50%; transform: translateX(-50%); }
  .stat-steps { top: 350px; left: 200px; }
  .stat-cals { top: 350px; right: 200px; }

  /* ── Phase 5: Crescendo / Celebration ── */
  .crescendo-stage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0;
  }

  .victory-burst {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%);
    opacity: 0;
  }

  .gold-particle {
    position: absolute; width: 6px; height: 6px;
    background: #D4AF37; border-radius: 50%;
    opacity: 0;
  }

  .confetti {
    position: absolute; width: 8px; height: 20px;
    border-radius: 2px; opacity: 0;
  }

  /* Tagline */
  .tagline-container {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center; opacity: 0;
  }

  .tagline-rise, .tagline-above {
    font-size: 120px; font-weight: 100; letter-spacing: 20px;
    text-transform: uppercase; line-height: 1.1;
    opacity: 0;
  }

  .tagline-rise { color: #fff; }
  .tagline-above { color: #D4AF37; }

  .tagline-bar {
    width: 0; height: 2px;
    background: #D4AF37;
    margin: 20px auto;
  }

  /* ── Phase 6: Logo Lockup ── */
  .logo-stage {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0;
  }

  .logo-apex {
    font-size: 140px; font-weight: 100; letter-spacing: 40px;
    color: #D4AF37; text-transform: uppercase;
    opacity: 0;
  }

  .logo-divider {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37, transparent);
    margin: 25px 0;
  }

  .logo-sub {
    font-size: 18px; font-weight: 300; letter-spacing: 12px;
    color: rgba(255,255,255,0.6); text-transform: uppercase;
    opacity: 0;
  }

  .logo-tagline-final {
    font-size: 24px; font-weight: 200; letter-spacing: 10px;
    color: rgba(212,175,55,0.8); text-transform: uppercase;
    margin-top: 40px; opacity: 0;
  }

  .corner-accent {
    position: absolute; width: 60px; height: 60px;
    border-color: rgba(212,175,55,0.3); border-style: solid;
    opacity: 0;
  }

  .corner-tl { top: 40px; left: 40px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 40px; right: 40px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 40px; left: 40px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 40px; right: 40px; border-width: 0 1px 1px 0; }

  /* ── Global overlays ── */
  .vignette {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    pointer-events: none; z-index: 100;
  }

  .scan-line {
    position: absolute; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.15), transparent);
    opacity: 0; z-index: 50;
    top: -2px;
  }

  .flash-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: #D4AF37; opacity: 0; z-index: 90;
    pointer-events: none;
  }
</style>
</head>

<div class="composition" data-composition-id="gradual-escalation-apex" style="width: 1920px; height: 1080px; position: relative; overflow: hidden;">

  <!-- Phase 1: Product Beauty Shot -->

    <div class="confetti" style="top: -20px; left: 20%; background: #fff;"></div>
    <div class="confetti" style="top: -20px; left: 30%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 40%; background: #B8962E;"></div>
    <div class="confetti" style="top: -20px; left: 50%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 60%; background: #fff;"></div>
    <div class="confetti" style="top: -20px; left: 70%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 80%; background: #B8962E;"></div>
    <div class="confetti" style="top: -20px; left: 90%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 15%; background: #fff;"></div>
    <div class="confetti" style="top: -20px; left: 25%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 35%; background: #B8962E;"></div>
    <div class="confetti" style="top: -20px; left: 45%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 55%; background: #fff;"></div>
    <div class="confetti" style="top: -20px; left: 65%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 75%; background: #B8962E;"></div>
    <div class="confetti" style="top: -20px; left: 85%; background: #D4AF37;"></div>
    <div class="confetti" style="top: -20px; left: 95%; background: #fff;"></div>

    <!-- Tagline -->
    <div class="tagline-container">
      <div class="tagline-rise">Rise</div>
      <div class="tagline-bar"></div>
      <div class="tagline-above">Above</div>
    </div>
  </div>

  <!-- Phase 6: Logo Lockup -->
  <div class="logo-stage">
    <div class="logo-apex">APEX</div>
    <div class="logo-divider"></div>
    <div class="logo-sub">Fitness Technology</div>
    <div class="logo-tagline-final">Rise Above</div>
    <div class="corner-accent corner-tl"></div>
    <div class="corner-accent corner-tr"></div>
    <div class="corner-accent corner-bl"></div>
    <div class="corner-accent corner-br"></div>
  </div>

</div>

<!-- Scripts at end of body -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomEase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js"></script>
<script>
  gsap.registerPlugin(CustomEase, DrawSVGPlugin);

  // Custom eases
  CustomEase.create("luxuryReveal", "M0,0 C0.14,0 0.242,0.438 0.272,0.561 0.313,0.728 0.354,0.963 0.362,1 0.37,0.985 0.414,0.873 0.455,0.811 0.51,0.726 0.573,0.753 0.626,0.8 0.681,0.849 0.735,0.953 0.775,0.979 0.85,1.03 0.919,1.004 1,1");
  CustomEase.create("smoothPower", "M0,0 C0.25,0.1 0.25,1 1,1");
  CustomEase.create("dramaticIn", "M0,0 C0.55,0.055 0.675,0.19 1,1");

  const tl = gsap.timeline({ paused: true });

  // Helper: counter animation
  function animateCounter(el, target, duration, tl, position) {
    const obj = { val: 0 };
    tl.to(obj, {
      val: target,
      duration: duration,
      ease: "power2.out",
      onUpdate: function() {
        if (el) {
          el.textContent = Math.round(obj.val).toLocaleString();
        }
      }
    }, position);
  }

  const particles = document.querySelectorAll('.gold-particle');
  const confetti = document.querySelectorAll('.confetti');
  const motionLines = document.querySelectorAll('.motion-line');

  // ══════════════════════════════════════════════
  // PHASE 1: PRODUCT BEAUTY SHOT (0s - 12s)
  // ══════════════════════════════════════════════

  // Fade in from black
  tl.to('.product-stage', { opacity: 1, duration: 1.5, ease: "power2.inOut" }, 0);

  // Ambient glow breathes in
  tl.to('.product-glow', { opacity: 1, scale: 1.2, duration: 3, ease: "smoothPower" }, 0.5);

  // Watch fades up with subtle float
  tl.to('.product-body', { opacity: 1, y: -20, duration: 2.5, ease: "luxuryReveal" }, 1);

  // Screen elements illuminate
  tl.to('.screen-time', { opacity: 1, duration: 1.2, ease: "power2.out" }, 2.5);
  tl.to('.screen-hr', { opacity: 1, duration: 1, ease: "power2.out" }, 3.2);
  tl.to('.screen-hr-value', { opacity: 1, duration: 1, ease: "power2.out" }, 3.5);

  // Product name reveals with letter spacing animation
  tl.fromTo('.product-name-reveal',
    { opacity: 0, letterSpacing: '60px' },
    { opacity: 1, letterSpacing: '30px', duration: 2, ease: "power3.out" }, 4);

  // Tagline slides in
  tl.fromTo('.product-tagline-small',
    { opacity: 0, y: 15 },
    { opacity: 1, y: 0, duration: 1.5, ease: "power2.out" }, 5.5);

  // Gold accent lines draw in
  tl.fromTo('.gold-line-1', { opacity: 0, scaleX: 0 }, { opacity: 0.3, scaleX: 1, duration: 2, ease: "power2.inOut" }, 3);
  tl.fromTo('.gold-line-2', { opacity: 0, scaleX: 0 }, { opacity: 0.3, scaleX: 1, duration: 2, ease: "power2.inOut" }, 3.3);
  tl.fromTo('.gold-line-left', { opacity: 0, scaleY: 0 }, { opacity: 0.2, scaleY: 1, duration: 2, ease: "power2.inOut" }, 3.6);
  tl.fromTo('.gold-line-right', { opacity: 0, scaleY: 0 }, { opacity: 0.2, scaleY: 1, duration: 2, ease: "power2.inOut" }, 3.9);

  // Subtle glow pulse
  tl.to('.product-glow', { scale: 1.4, opacity: 0.8, duration: 2, ease: "sine.inOut", yoyo: true, repeat: 1 }, 5);

  // Spec panels stagger in
  tl.fromTo('.spec-1', { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 1, ease: "power2.out" }, 7);
  tl.fromTo('.spec-2', { opacity: 0, x: 30 }, { opacity: 1, x: 0, duration: 1, ease: "power2.out" }, 7.3);
  tl.fromTo('.spec-3', { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 1, ease: "power2.out" }, 7.6);
  tl.fromTo('.spec-4', { opacity: 0, x: 30 }, { opacity: 1, x: 0, duration: 1, ease: "power2.out" }, 7.9);

  // Scan line sweeps
  tl.fromTo('.scan-line', { opacity: 0, top: 0 }, { opacity: 0.5, top: '100%', duration: 2, ease: "none" }, 6);

  // Hold and breathe
  tl.to('.product-body', { y: -30, duration: 3, ease: "sine.inOut" }, 9);

  // ══════════════════════════════════════════════
  // TRANSITION 1→2: Product fades, energy shifts (12s - 14s)
  // ══════════════════════════════════════════════

  tl.to('.product-stage', { opacity: 0, duration: 1.5, ease: "power2.inOut" }, 12);

  // ══════════════════════════════════════════════
  // PHASE 2: ATHLETES IN MOTION (13s - 23s)
  // ══════════════════════════════════════════════

  tl.to('.athlete-stage', { opacity: 1, duration: 1, ease: "power2.inOut" }, 13);

  // Panel dividers slash in
  tl.fromTo('.panel-divider-1', { opacity: 0, scaleY: 0 }, { opacity: 0.8, scaleY: 1, duration: 0.8, ease: "power3.out" }, 13.5);
  tl.fromTo('.panel-divider-2', { opacity: 0, scaleY: 0 }, { opacity: 0.8, scaleY: 1, duration: 0.8, ease: "power3.out" }, 13.7);

  // Athletes burst in from below — staggered
  tl.fromTo('.athlete-panel-1',
    { opacity: 0, y: 100 },
    { opacity: 1, y: 0, duration: 1.2, ease: "dramaticIn" }, 14);
  tl.fromTo('.athlete-panel-2',
    { opacity: 0, y: 100 },
    { opacity: 1, y: 0, duration: 1.2, ease: "dramaticIn" }, 14.3);
  tl.fromTo('.athlete-panel-3',
    { opacity: 0, y: 100 },
    { opacity: 1, y: 0, duration: 1.2, ease: "dramaticIn" }, 14.6);

  // Athlete labels
  tl.to('.athlete-panel-1 .athlete-label', { opacity: 1, duration: 0.8, ease: "power2.out" }, 15.5);
  tl.to('.athlete-panel-2 .athlete-label', { opacity: 1, duration: 0.8, ease: "power2.out" }, 15.8);
  tl.to('.athlete-panel-3 .athlete-label', { opacity: 1, duration: 0.8, ease: "power2.out" }, 16.1);

  // Motion lines streak across
  motionLines.forEach(function(line, i) {
    tl.fromTo(line,
      { opacity: 0, x: -300 },
      { opacity: 0.6, x: 200, duration: 1.5, ease: "power2.out" }, 15 + i * 0.15);
    tl.to(line, { opacity: 0, x: 500, duration: 1, ease: "power2.in" }, 16.5 + i * 0.1);
  });

  // Runner leg animation
  tl.to('.runner-leg-front', { rotation: -15, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 5 }, 15);
  tl.to('.runner-leg-back', { rotation: 15, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 5 }, 15);
  tl.to('.runner-arm-front', { rotation: -20, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 5 }, 15);
  tl.to('.runner-arm-back', { rotation: 15, duration: 0.3, ease: "sine.inOut", yoyo: true, repeat: 5 }, 15);

  // Cyclist wheel spin
  tl.to('.bike-wheel-front', { rotation: 720, duration: 4, ease: "power1.inOut" }, 15);
  tl.to('.bike-wheel-back', { rotation: 720, duration: 4, ease: "power1.inOut" }, 15);

  // Lifter barbell press up
  tl.to('.barbell', { y: -40, duration: 0.8, ease: "power3.out", yoyo: true, repeat: 2, repeatDelay: 0.4 }, 15.5);
  tl.to(['.barbell-plate-left', '.barbell-plate-right'], { y: -40, duration: 0.8, ease: "power3.out", yoyo: true, repeat: 2, repeatDelay: 0.4 }, 15.5);

  // Energy building — subtle camera-style zoom on panels
  tl.to('.athlete-stage', { scale: 1.05, duration: 4, ease: "power1.in", transformOrigin: "center center" }, 18);

  // Scan line sweep
  tl.fromTo('.scan-line', { opacity: 0, top: 0 }, { opacity: 0.3, top: '100%', duration: 1.5, ease: "none" }, 17);

  // ══════════════════════════════════════════════
  // TRANSITION 2→3: Quick wipe (22s - 24s)
  // ══════════════════════════════════════════════

  tl.to('.athlete-stage', { opacity: 0, duration: 1, ease: "power3.inOut" }, 22);

  // ══════════════════════════════════════════════
  // PHASE 3: DATA PULSE / HEARTBEAT (23s - 30s)
  // ══════════════════════════════════════════════

  tl.to('.data-stage', { opacity: 1, duration: 0.8, ease: "power2.inOut" }, 23);

  // Pulse rings expand outward in sequence
  tl.fromTo('.pulse-ring-1', { opacity: 0, scale: 0.5 }, { opacity: 0.8, scale: 1, duration: 1, ease: "power2.out" }, 23.3);
  tl.fromTo('.pulse-ring-2', { opacity: 0, scale: 0.5 }, { opacity: 0.6, scale: 1, duration: 1, ease: "power2.out" }, 23.6);
  tl.fromTo('.pulse-ring-3', { opacity: 0, scale: 0.5 }, { opacity: 0.4, scale: 1, duration: 1, ease: "power2.out" }, 23.9);
  tl.fromTo('.pulse-ring-4', { opacity: 0, scale: 0.5 }, { opacity: 0.25, scale: 1, duration: 1, ease: "power2.out" }, 24.2);
  tl.fromTo('.pulse-ring-5', { opacity: 0, scale: 0.5 }, { opacity: 0.15, scale: 1, duration: 1, ease: "power2.out" }, 24.5);

  // Pulse rings throb
  tl.to('.pulse-ring-1', { scale: 1.15, opacity: 0.5, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 5 }, 24.5);
  tl.to('.pulse-ring-2', { scale: 1.1, opacity: 0.4, duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 5 }, 24.6);

  // Heartbeat line draws
  tl.fromTo('.heartbeat-line', { opacity: 0 }, { opacity: 1, duration: 0.5 }, 24);
  tl.fromTo('.heartbeat-path', { drawSVG: "0%" }, { drawSVG: "100%", duration: 3, ease: "none" }, 24.2);

  // Stat counters
  tl.to('.stat-bpm', { opacity: 1, duration: 0.5 }, 25);
  animateCounter(document.getElementById('bpm-number'), 156, 2, tl, 25);

  tl.to('.stat-steps', { opacity: 1, duration: 0.5 }, 25.5);
  animateCounter(document.getElementById('steps-number'), 12847, 2.5, tl, 25.5);

  tl.to('.stat-cals', { opacity: 1, duration: 0.5 }, 26);
  animateCounter(document.getElementById('cals-number'), 2340, 2.5, tl, 26);

  // Intensify: rings pulse faster
  tl.to('.pulse-ring-3', { scale: 1.2, opacity: 0.5, duration: 0.4, ease: "sine.inOut", yoyo: true, repeat: 3 }, 27.5);

  // Scan line
  tl.fromTo('.scan-line', { opacity: 0, top: 0 }, { opacity: 0.4, top: '100%', duration: 1, ease: "none" }, 27);

  // ══════════════════════════════════════════════
  // TRANSITION 3→4: Flash into crescendo (29s - 31s)
  // ══════════════════════════════════════════════

  tl.to('.data-stage', { opacity: 0, duration: 0.5, ease: "power3.in" }, 29.5);
  tl.to('.flash-overlay', { opacity: 0.6, duration: 0.15, ease: "power4.in" }, 30);
  tl.to('.flash-overlay', { opacity: 0, duration: 0.5, ease: "power2.out" }, 30.15);

  // ══════════════════════════════════════════════
  // PHASE 4: CRESCENDO / CELEBRATION (30s - 36s)
  // ══════════════════════════════════════════════

  tl.to('.crescendo-stage', { opacity: 1, duration: 0.3, ease: "power2.out" }, 30.2);

  // Victory burst expands
  tl.fromTo('.victory-burst',
    { width: 0, height: 0, opacity: 0 },
    { width: 1400, height: 1400, opacity: 0.6, duration: 1.5, ease: "power3.out" }, 30.3);
  tl.to('.victory-burst', { opacity: 0, duration: 1.5, ease: "power2.in" }, 31.5);

  // Gold particles explode outward
  particles.forEach(function(p, i) {
    var angle = (i / particles.length) * Math.PI * 2;
    var dist = 300 + Math.random() * 400;
    var xDest = Math.cos(angle) * dist;
    var yDest = Math.sin(angle) * dist;
    tl.fromTo(p,
      { opacity: 0, x: 0, y: 0, scale: 0 },
      { opacity: 1, x: xDest, y: yDest, scale: 1 + Math.random() * 2, duration: 1.2, ease: "power3.out" }, 30.3 + Math.random() * 0.3);
    tl.to(p, { opacity: 0, duration: 0.8, ease: "power2.in" }, 31.5 + Math.random() * 0.3);
  });

  // Confetti falls
  confetti.forEach(function(c, i) {
    tl.fromTo(c,
      { opacity: 0, y: -40, rotation: 0 },
      { opacity: 0.8, y: 1100, rotation: 360 + Math.random() * 360,
        duration: 3 + Math.random() * 2, ease: "power1.in" }, 30.5 + Math.random() * 0.5);
  });

  // TAGLINE: "Rise Above"
  tl.fromTo('.tagline-container', { opacity: 0 }, { opacity: 1, duration: 0.3 }, 31);

  tl.fromTo('.tagline-rise',
    { opacity: 0, y: 60, scale: 0.8 },
    { opacity: 1, y: 0, scale: 1, duration: 1.2, ease: "power3.out" }, 31.2);

  tl.fromTo('.tagline-bar',
    { width: 0 },
    { width: 200, duration: 0.8, ease: "power2.inOut" }, 32);

  tl.fromTo('.tagline-above',
    { opacity: 0, y: -60, scale: 0.8 },
    { opacity: 1, y: 0, scale: 1, duration: 1.2, ease: "power3.out" }, 32.2);

  // Tagline pulses with gold shimmer
  tl.to('.tagline-above', { textShadow: "0 0 40px rgba(212,175,55,0.8)", duration: 0.8, ease: "sine.inOut", yoyo: true, repeat: 1 }, 33.5);

  // Flash transition
  tl.to('.flash-overlay', { opacity: 0.4, duration: 0.1 }, 35);
  tl.to('.flash-overlay', { opacity: 0, duration: 0.4 }, 35.1);

  // ══════════════════════════════════════════════
  // PHASE 5: LOGO LOCKUP (35s - 40s)
  // ══════════════════════════════════════════════

  tl.to('.crescendo-stage', { opacity: 0, duration: 0.8, ease: "power2.inOut" }, 35);

  tl.to('.logo-stage', { opacity: 1, duration: 0.8, ease: "power2.inOut" }, 35.5);

  // APEX logo scales in
  tl.fromTo('.logo-apex',
    { opacity: 0, scale: 1.5, letterSpacing: '80px' },
    { opacity: 1, scale: 1, letterSpacing: '40px', duration: 1.8, ease: "power3.out" }, 35.8);

  // Divider line
  tl.fromTo('.logo-divider',
    { width: 0 },
    { width: 300, duration: 1, ease: "power2.inOut" }, 36.8);

  // Sub text
  tl.fromTo('.logo-sub',
    { opacity: 0, y: 10 },
    { opacity: 1, y: 0, duration: 1, ease: "power2.out" }, 37.3);

  // Final tagline
  tl.fromTo('.logo-tagline-final',
    { opacity: 0, y: 10 },
    { opacity: 1, y: 0, duration: 1, ease: "power2.out" }, 37.8);

  // Corner accents
  tl.to('.corner-tl', { opacity: 1, duration: 0.6, ease: "power2.out" }, 37);
  tl.to('.corner-tr', { opacity: 1, duration: 0.6, ease: "power2.out" }, 37.15);
  tl.to('.corner-br', { opacity: 1, duration: 0.6, ease: "power2.out" }, 37.3);
  tl.to('.corner-bl', { opacity: 1, duration: 0.6, ease: "power2.out" }, 37.45);

  // Gentle breathe on final logo
  tl.to('.logo-apex', {
    textShadow: "0 0 60px rgba(212,175,55,0.4)",
    duration: 1.5, ease: "sine.inOut"
  }, 38);

  // Hold on final frame through 40s
  tl.to({}, { duration: 1 }, 39);

  // Register the timeline
  window.__timelines = window.__timelines || {};
  window.__timelines["gradual-escalation-apex"] = tl;
</script>

</body>
</html>
