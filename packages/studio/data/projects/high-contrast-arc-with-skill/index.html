<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>SHATTERED - Thriller Title Sequence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .composition {
      background: #0a0a0a;
      font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }

    /* Phase 1: Tense - Drifting text fragments in darkness */
    .fragment {
      position: absolute;
      font-size: 18px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0;
      color: rgba(255, 255, 255, 0.4);
    }
    .fragment.red { color: rgba(180, 30, 30, 0.5); }
    .fragment-1 { top: 200px; left: 300px; font-size: 14px; }
    .fragment-2 { top: 480px; left: 1200px; font-size: 16px; }
    .fragment-3 { top: 650px; left: 500px; font-size: 12px; }
    .fragment-4 { top: 350px; left: 900px; font-size: 20px; }
    .fragment-5 { top: 750px; left: 150px; font-size: 15px; }
    .fragment-6 { top: 150px; left: 1400px; font-size: 13px; }
    .fragment-7 { top: 550px; left: 700px; font-size: 17px; }
    .fragment-8 { top: 880px; left: 1000px; font-size: 11px; }

    /* Tension line */
    .tension-line {
      position: absolute;
      top: 540px;
      left: 0;
      width: 1920px;
      height: 1px;
      background: rgba(180, 30, 30, 0.3);
      transform: scaleX(0);
      transform-origin: center;
    }

    /* Phase 2: Punchy - Title reveal */
    .title-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .title-text {
      font-size: 180px;
      font-weight: 900;
      letter-spacing: 30px;
      text-transform: uppercase;
      color: #fff;
      opacity: 0;
      text-align: center;
      line-height: 1;
      text-shadow: 0 0 60px rgba(180, 30, 30, 0.8), 0 0 120px rgba(180, 30, 30, 0.4);
    }

    /* Glass shards */
    .shard {
      position: absolute;
      opacity: 0;
      z-index: 5;
    }
    .shard svg { width: 100%; height: 100%; }
    .shard-1 { top: 300px; left: 400px; width: 80px; height: 120px; }
    .shard-2 { top: 200px; left: 800px; width: 60px; height: 90px; }
    .shard-3 { top: 500px; left: 1200px; width: 100px; height: 70px; }
    .shard-4 { top: 600px; left: 600px; width: 50px; height: 110px; }
    .shard-5 { top: 150px; left: 1000px; width: 70px; height: 80px; }
    .shard-6 { top: 700px; left: 350px; width: 90px; height: 60px; }
    .shard-7 { top: 400px; left: 1400px; width: 55px; height: 100px; }
    .shard-8 { top: 800px; left: 900px; width: 75px; height: 85px; }
    .shard-9 { top: 250px; left: 200px; width: 65px; height: 95px; }
    .shard-10 { top: 650px; left: 1100px; width: 85px; height: 55px; }
    .shard-11 { top: 350px; left: 700px; width: 45px; height: 75px; }
    .shard-12 { top: 500px; left: 300px; width: 70px; height: 65px; }

    /* Impact flash */
    .impact-flash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(180,30,30,0.3) 40%, transparent 70%);
      opacity: 0;
      z-index: 20;
    }

    /* Red pulse ring */
    .pulse-ring {
      position: absolute;
      top: 50%; left: 50%;
      width: 200px; height: 200px;
      border: 2px solid rgba(180, 30, 30, 0.6);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      z-index: 8;
    }

    /* Phase 3: Calm - Floating debris */
    .debris {
      position: absolute;
      opacity: 0;
      z-index: 3;
    }
    .debris-dot {
      width: 4px; height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
    }
    .debris-line {
      width: 30px; height: 1px;
      background: rgba(180, 30, 30, 0.2);
      transform-origin: left center;
    }
    .debris-shard-small {
      width: 8px; height: 12px;
      background: rgba(255, 255, 255, 0.15);
      clip-path: polygon(50% 0%, 100% 100%, 0% 80%);
    }

    .debris-1 { top: 200px; left: 300px; }
    .debris-2 { top: 400px; left: 700px; }
    .debris-3 { top: 600px; left: 1100px; }
    .debris-4 { top: 300px; left: 1500px; }
    .debris-5 { top: 750px; left: 400px; }
    .debris-6 { top: 150px; left: 900px; }
    .debris-7 { top: 850px; left: 1300px; }
    .debris-8 { top: 500px; left: 200px; }
    .debris-9 { top: 350px; left: 1050px; }
    .debris-10 { top: 680px; left: 600px; }
    .debris-11 { top: 100px; left: 1600px; }
    .debris-12 { top: 900px; left: 800px; }
    .debris-13 { top: 450px; left: 1400px; }
    .debris-14 { top: 250px; left: 500px; }
    .debris-15 { top: 780px; left: 1000px; }

    /* Settled title for Phase 3 */
    .title-settled {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 160px;
      font-weight: 900;
      letter-spacing: 25px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.7);
      opacity: 0;
      z-index: 6;
      text-shadow: 0 0 40px rgba(180, 30, 30, 0.3);
    }

    /* Subtitle */
    .subtitle {
      position: absolute;
      top: calc(50% + 110px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: rgba(180, 30, 30, 0.5);
      opacity: 0;
      z-index: 6;
    }

    /* Ambient vignette */
    .vignette {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      z-index: 1;
      pointer-events: none;
    }

    /* Dark overlay for tension */
    .dark-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3);
      opacity: 0;
      z-index: 2;
    }
  </style>
</head>
<body>

<div class="composition" data-composition-id="high-contrast-arc-shattered" style="width: 1920px; height: 1080px; position: relative; overflow: hidden;">

  <!-- Ambient vignette (always visible) -->
  <div class="vignette"></div>
  <div class="dark-overlay"></div>

  <!-- Phase 1: Tense - Text fragments drifting in darkness -->
  <div class="fragment fragment-1">no escape</div>
  <div class="fragment fragment-2 red">the truth</div>
  <div class="fragment fragment-3">beneath the surface</div>
  <div class="fragment fragment-4 red">broken</div>
  <div class="fragment fragment-5">who are you</div>
  <div class="fragment fragment-6">silence</div>
  <div class="fragment fragment-7 red">shattered</div>
  <div class="fragment fragment-8">in the dark</div>

  <div class="tension-line"></div>

  <!-- Phase 2: Punchy - Title reveal with glass shatter -->
  <div class="impact-flash"></div>

  <div class="title-container">
    <div class="title-text">SHATTERED</div>
  </div>

  <div class="pulse-ring"></div>

  <!-- Glass shards (SVG for angular shattering glass shapes) -->
  <div class="shard shard-1"><svg viewBox="0 0 80 120"><polygon points="40,0 80,70 50,120 0,90" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-2"><svg viewBox="0 0 60 90"><polygon points="30,0 60,50 40,90 0,60" fill="rgba(180,30,30,0.1)" stroke="rgba(180,30,30,0.3)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-3"><svg viewBox="0 0 100 70"><polygon points="50,0 100,40 70,70 0,50" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-4"><svg viewBox="0 0 50 110"><polygon points="25,0 50,60 30,110 0,80" fill="rgba(180,30,30,0.08)" stroke="rgba(180,30,30,0.2)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-5"><svg viewBox="0 0 70 80"><polygon points="35,0 70,45 50,80 0,60" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-6"><svg viewBox="0 0 90 60"><polygon points="45,0 90,35 60,60 0,40" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.25)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-7"><svg viewBox="0 0 55 100"><polygon points="28,0 55,55 35,100 0,75" fill="rgba(180,30,30,0.1)" stroke="rgba(180,30,30,0.25)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-8"><svg viewBox="0 0 75 85"><polygon points="38,0 75,50 55,85 0,60" fill="rgba(255,255,255,0.11)" stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-9"><svg viewBox="0 0 65 95"><polygon points="33,0 65,55 45,95 0,70" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-10"><svg viewBox="0 0 85 55"><polygon points="43,0 85,30 60,55 0,40" fill="rgba(180,30,30,0.12)" stroke="rgba(180,30,30,0.25)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-11"><svg viewBox="0 0 45 75"><polygon points="23,0 45,40 30,75 0,55" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/></svg></div>
  <div class="shard shard-12"><svg viewBox="0 0 70 65"><polygon points="35,0 70,35 50,65 0,48" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/></svg></div>

  <!-- Phase 3: Calm - Floating debris -->
  <div class="debris debris-1"><div class="debris-dot"></div></div>
  <div class="debris debris-2"><div class="debris-shard-small"></div></div>
  <div class="debris debris-3"><div class="debris-line"></div></div>
  <div class="debris debris-4"><div class="debris-dot"></div></div>
  <div class="debris debris-5"><div class="debris-shard-small"></div></div>
  <div class="debris debris-6"><div class="debris-line"></div></div>
  <div class="debris debris-7"><div class="debris-dot"></div></div>
  <div class="debris debris-8"><div class="debris-shard-small"></div></div>
  <div class="debris debris-9"><div class="debris-line"></div></div>
  <div class="debris debris-10"><div class="debris-dot"></div></div>
  <div class="debris debris-11"><div class="debris-shard-small"></div></div>
  <div class="debris debris-12"><div class="debris-line"></div></div>
  <div class="debris debris-13"><div class="debris-dot"></div></div>
  <div class="debris debris-14"><div class="debris-shard-small"></div></div>
  <div class="debris debris-15"><div class="debris-line"></div></div>

  <!-- Settled title for calm phase -->
  <div class="title-settled">SHATTERED</div>
  <div class="subtitle">a thriller</div>

</div>

<!-- GSAP 3.14.2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomEase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomWiggle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/CustomBounce.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/SplitText.min.js"></script>
<script>
  // Register ALL plugins before use
  gsap.registerPlugin(CustomEase, CustomWiggle, CustomBounce, SplitText);

  // =========================================================================
  // PHASE DECOMPOSITION (from emotion-to-motion skill)
  // =========================================================================
  // Phase 1: TENSE (0s - 15s) — creeping unease
  //   Entrance: slow reveal (25% = 3.75s)
  //   Emphasis: tension hold w/ CustomWiggle micro-tremor (50% = 7.5s)
  //   Exit:     compress (25% = 3.75s)
  //
  // Transition: tense -> punchy = HARD (0.5s overlap)
  //
  // Phase 2: PUNCHY (14.5s - 24.5s) — explosive reveal
  //   Entrance: impact (15% = 1.5s), SplitText chars
  //   Emphasis: pulse (60% = 6s)
  //   Exit:     snap out (25% = 2.5s)
  //
  // Transition: punchy -> calm = HARD (0.5s overlap)
  //
  // Phase 3: CALM (24s - 44s) — aftermath with floating debris
  //   Entrance: ensemble (20% = 4s)
  //   Emphasis: drift (65% = 13s)
  //   Exit:     fade recede (15% = 3s)
  // =========================================================================

  // Custom eases (Principle 6: Slow In, Slow Out — easing is non-negotiable)
  // Tense: creeping ease — barely moves for 80%, then rushes (tense recipe)
  CustomEase.create("creepingDread", "M0,0 C0.05,0.01 0.1,0.02 0.2,0.03 0.4,0.05 0.6,0.08 0.75,0.15 0.85,0.3 0.92,0.6 1,1");

  // Micro-tremor for tension hold (tense emphasis: 14 wiggles, uniform type)
  CustomWiggle.create("microTremor", { wiggles: 14, type: "uniform" });

  // =========================================================================
  // MASTER TIMELINE
  // =========================================================================
  const tl = gsap.timeline({ paused: true });

  // Register for HyperFrames
  window.__timelines = window.__timelines || {};
  window.__timelines["high-contrast-arc-shattered"] = tl;

  // =========================================================================
  // PHASE 1: TENSE (0s - 15s)
  // Mood recipe: creeping motion, subtle tremor, no release, stagger from end
  // =========================================================================
  const phase1 = gsap.timeline();

  // --- Phase 1 Entrance: Slow Reveal (0s - 3.75s) ---
  // Principle 3 (Staging): elements emerge one at a time with long pauses
  // Principle 9 (Timing): 1-2s durations = slow, cinematic
  // Tense recipe: stagger from end — things approach from the unknown
  var fragments = gsap.utils.toArray(".fragment");

  // Dark overlay creeps in (Principle 8: Secondary Action reinforces mood)
  phase1.to(".dark-overlay", {
    opacity: 0.5, duration: 3, ease: "creepingDread"
  }, 0);

  // Fragments emerge one at a time from end (tense: stagger from end)
  fragments.forEach(function(el, i) {
    var reverseIndex = fragments.length - 1 - i;
    var startTime = reverseIndex * 0.45;
    // Principle 7 (Arcs): slight curved drift, not straight-line
    phase1.fromTo(el,
      { opacity: 0, y: 15, x: -5 },
      { opacity: 0.4, y: 0, x: 0, duration: 1.2, ease: "power2.out" },
      startTime
    );
  });

  // --- Phase 1 Emphasis: Tension Hold (3.75s - 11.25s) ---
  // Skill pattern: near-stillness with micro-tremor on one element
  // CustomWiggle 14 wiggles, uniform — no bounce, no elastic (tension doesn't resolve)
  var emphasisStart1 = 3.75;
  var emphasisDuration1 = 7.5;

  // Micro-tremor on the key "shattered" fragment (tension hold emphasis pattern)
  phase1.to(".fragment-7", {
    x: 2, ease: "microTremor", duration: emphasisDuration1
  }, emphasisStart1);

  // Very slow drift on other fragments (Principle 11: Solid Drawing — parallax depth)
  fragments.forEach(function(el, i) {
    var driftAmount = (i % 2 === 0) ? -3 : 3;
    var driftY = (i % 3 === 0) ? -2 : 1;
    phase1.to(el, {
      x: "+=" + driftAmount,
      y: "+=" + driftY,
      duration: emphasisDuration1,
      ease: "sine.inOut"
    }, emphasisStart1);
  });

  // Tension line crawls across (creeping ease — barely moves, then rushes)
  phase1.to(".tension-line", {
    scaleX: 1, duration: emphasisDuration1, ease: "creepingDread"
  }, emphasisStart1);

  // Subtle red pulse on tension line (Principle 8: Secondary Action)
  phase1.to(".tension-line", {
    opacity: 0.6, duration: 1.25, ease: "sine.inOut",
    yoyo: true, repeat: Math.floor(emphasisDuration1 / 2.5)
  }, emphasisStart1);

  // --- Phase 1 Exit: Compress (11.25s - 15s) ---
  // Tense exit pattern: elements slowly contract inward before next scene hits
  var exitStart1 = 11.25;
  var exitDuration1 = 3.75;

  phase1.to(".fragment", {
    scale: 0.9, x: 0, y: 0, opacity: 0.15,
    duration: exitDuration1, ease: "power4.in",
    stagger: 0.05
  }, exitStart1);

  phase1.to(".tension-line", {
    opacity: 0.8, scaleY: 2, duration: exitDuration1, ease: "power4.in"
  }, exitStart1);

  phase1.to(".dark-overlay", {
    opacity: 0.8, duration: exitDuration1, ease: "power3.in"
  }, exitStart1);

  // Add Phase 1 to master
  tl.add(phase1, 0);

  // =========================================================================
  // TRANSITION: tense -> punchy = HARD (0.3-0.8s overlap)
  // Matrix lookup: tense->punchy = hard
  // Technique: Phase 1 snaps out, Phase 2 slams in simultaneously
  // =========================================================================
  var t1Overlap = 0.5;

  // =========================================================================
  // PHASE 2: PUNCHY (14.5s - 24.5s)
  // Mood recipe: hard stops, squash on impact, rhythmic timing (0.04-0.08s stagger),
  //              minimal follow-through — things STOP
  // =========================================================================
  var phase2Start = 15 - t1Overlap;
  var phase2 = gsap.timeline();

  // --- Phase 2 Entrance: Impact (0s - 1.5s) ---
  // Punchy entrance: hero element hits first and HARD, supporting elements follow
  // Principle 1 (Squash & Stretch): squash on impact, settle to 1
  // Principle 2 (Anticipation): brief screen compress before the slam
  // Principle 10 (Exaggeration): scale 1.4 overshoot for impact

  // Hard snap-out of remaining Phase 1 elements (hard transition)
  phase2.to(".fragment", {
    opacity: 0, scale: 0.95, duration: 0.15, ease: "power3.in"
  }, 0);
  phase2.to(".tension-line", {
    opacity: 0, duration: 0.1, ease: "none"
  }, 0);

  // Brief anticipation: screen goes fully dark (Principle 2)
  phase2.to(".dark-overlay", {
    opacity: 1, duration: 0.2, ease: "power2.in"
  }, 0);

  // Impact flash — instantaneous white burst (Principle 10: Exaggeration)
  phase2.to(".impact-flash", {
    opacity: 1, duration: 0.06, ease: "power4.out"
  }, 0.3);
  phase2.to(".impact-flash", {
    opacity: 0, duration: 0.5, ease: "power3.out"
  }, 0.36);

  // SplitText on title for per-character reveal (requested plugin)
  var titleSplit = new SplitText(".title-text", { type: "chars" });
  var titleChars = titleSplit.chars;

  // Title container visible
  phase2.set(".title-text", { opacity: 1 }, 0.3);

  // Characters SLAM in with squash-stretch (Principle 1)
  // Punchy recipe: rhythmic 0.04s stagger, from center for radial impact
  phase2.fromTo(titleChars,
    { opacity: 0, scaleY: 0.5, scaleX: 1.3, y: 15 },
    {
      opacity: 1, scaleY: 1, scaleX: 1, y: 0,
      duration: 0.15, ease: "power4.out",
      stagger: { each: 0.04, from: "center" }
    },
    0.3
  );

  // Dark overlay clears after impact
  phase2.to(".dark-overlay", {
    opacity: 0, duration: 0.4, ease: "power2.out"
  }, 0.4);

  // Glass shards explode outward (Principle 5: Follow-through, Principle 8: Secondary Action)
  // Rhythmic stagger = punchy recipe (consistent 0.04s beat)
  var shards = gsap.utils.toArray(".shard");

  shards.forEach(function(shard, i) {
    var angle = (i / shards.length) * Math.PI * 2;
    var distance = 80 + ((i * 17) % 120);
    var xBurst = Math.cos(angle) * distance;
    var yBurst = Math.sin(angle) * distance;
    var rot = ((i % 2 === 0) ? 1 : -1) * (15 + (i * 5) % 45);

    // Initial burst outward
    phase2.fromTo(shard,
      { opacity: 0, scale: 0.3 },
      {
        opacity: 0.7, scale: 1,
        x: xBurst * 0.3, y: yBurst * 0.3,
        rotation: rot * 0.3,
        duration: 0.15, ease: "power4.out"
      },
      0.34 + i * 0.04
    );
  });

  // Pulse ring expands from center (Principle 8: Secondary Action reinforces impact)
  phase2.to(".pulse-ring", {
    opacity: 0.6, scale: 8, duration: 0.6, ease: "power3.out"
  }, 0.32);
  phase2.to(".pulse-ring", {
    opacity: 0, duration: 0.4, ease: "power2.out"
  }, 0.92);

  // --- Phase 2 Emphasis: Pulse (1.5s - 7.5s) ---
  // Punchy emphasis: subtle scale oscillation on key element
  // Principle 9 (Timing): consistent rhythmic beat
  var emphasisStart2 = 1.5;
  var emphasisDuration2 = 6;

  // Title pulse — subtle scale throb (punchy pulse pattern)
  var pulseRepeat2 = Math.floor(emphasisDuration2 / 0.8) - 1;
  phase2.to(".title-text", {
    scale: 1.015, duration: 0.4, ease: "sine.inOut",
    yoyo: true, repeat: pulseRepeat2
  }, emphasisStart2);

  // Red glow throb on title (Principle 8: Secondary Action)
  phase2.to(".title-text", {
    textShadow: "0 0 80px rgba(180,30,30,1), 0 0 160px rgba(180,30,30,0.6)",
    duration: 0.6, ease: "sine.inOut",
    yoyo: true, repeat: Math.floor(emphasisDuration2 / 1.2) - 1
  }, emphasisStart2);

  // Shards continue slow drift outward during emphasis (Principle 5: Follow-through)
  shards.forEach(function(shard, i) {
    var angle = (i / shards.length) * Math.PI * 2;
    var distance = 80 + ((i * 17) % 120);
    var xDrift = Math.cos(angle) * distance;
    var yDrift = Math.sin(angle) * distance;
    var rot = ((i % 2 === 0) ? 1 : -1) * (15 + (i * 5) % 45);

    phase2.to(shard, {
      x: xDrift, y: yDrift, rotation: rot,
      duration: emphasisDuration2, ease: "power1.out"
    }, emphasisStart2);
  });

  // --- Phase 2 Exit: Snap Out (7.5s - 10s) ---
  // Punchy exit: hard opacity to 0 — just gone. No ease out.
  var exitStart2 = 7.5;

  // Title snaps out (snap out pattern: duration 0.08, ease "none")
  phase2.to(".title-text", {
    opacity: 0, duration: 0.08, ease: "none"
  }, exitStart2);

  // Shards snap out in quick rhythmic succession
  phase2.to(".shard", {
    opacity: 0, duration: 0.08, ease: "none",
    stagger: 0.03
  }, exitStart2 + 0.1);

  // Darkness slams back in (inverted flash for hard transition out)
  phase2.to(".dark-overlay", {
    opacity: 0.6, duration: 0.1, ease: "power4.out"
  }, exitStart2);
  phase2.to(".dark-overlay", {
    opacity: 0.2, duration: 1.5, ease: "sine.out"
  }, exitStart2 + 0.1);

  // Add Phase 2 to master at overlap position
  tl.add(phase2, phase2Start);

  // =========================================================================
  // TRANSITION: punchy -> calm = HARD (0.3-0.8s overlap)
  // Matrix lookup: punchy->calm = hard
  // =========================================================================
  var t2Overlap = 0.5;

  // =========================================================================
  // PHASE 3: CALM (24s - 44s)
  // Mood recipe: slow and continuous (1.5-3s durations), sine.inOut everything,
  //              no sudden movements, generous spacing (30%+ gap),
  //              breathing motion for holds
  // =========================================================================
  var phase3Start = phase2Start + 10 - t2Overlap;
  var phase3 = gsap.timeline();

  // --- Phase 3 Entrance: Ensemble (0s - 4s) ---
  // Calm entrance: elements fade in together in 2-3 groups
  // Principle 3 (Staging): 20-30% overlap between groups — elements breathe
  // Principle 4 (Pose to Pose): two states + right ease = enough

  // Group 1: settled title emerges softly
  phase3.fromTo(".title-settled",
    { opacity: 0, y: 10, scale: 0.98 },
    { opacity: 0.7, y: 0, scale: 1, duration: 2.5, ease: "sine.inOut" },
    0
  );

  // Group 2: subtitle follows with slight offset (ensemble: feels unified)
  phase3.fromTo(".subtitle",
    { opacity: 0, y: 8 },
    { opacity: 0.5, y: 0, duration: 2, ease: "sine.inOut" },
    0.8
  );

  // Group 3: debris particles appear (30%+ gap between groups = calm recipe)
  var debris = gsap.utils.toArray(".debris");

  // First debris group (even indices)
  debris.forEach(function(el, i) {
    if (i % 2 === 0) {
      phase3.fromTo(el,
        { opacity: 0, y: 5 },
        { opacity: 0.6, y: 0, duration: 1.5, ease: "sine.inOut" },
        1.5 + i * 0.12
      );
    }
  });
  // Second debris group (odd indices)
  debris.forEach(function(el, i) {
    if (i % 2 !== 0) {
      phase3.fromTo(el,
        { opacity: 0, y: 5 },
        { opacity: 0.5, y: 0, duration: 1.5, ease: "sine.inOut" },
        2.2 + i * 0.1
      );
    }
  });

  // Dark overlay settles to subtle
  phase3.to(".dark-overlay", {
    opacity: 0.1, duration: 3, ease: "sine.inOut"
  }, 0);

  // --- Phase 3 Emphasis: Drift (4s - 17s) ---
  // Calm emphasis: slow continuous motion, gentle float, parallax shift
  // Principle 7 (Arcs): curved paths on debris for organic feel
  // Principle 12 (Appeal): nothing jarring, motion matches serene aftermath
  var emphasisStart3 = 4;
  var emphasisDuration3 = 13;

  // Debris gentle drift (Principle 11: Solid Drawing — parallax layers create depth)
  debris.forEach(function(el, i) {
    var driftX = (i % 3 === 0) ? -15 : (i % 3 === 1) ? 12 : -8;
    var driftY = (i % 2 === 0) ? -10 : 8;
    var rotDrift = (i % 2 === 0) ? 15 : -10;
    var speed = emphasisDuration3 * (0.8 + (i % 4) * 0.1);

    // Slow continuous float (calm: 1.5-3s+ durations, sine.inOut)
    phase3.to(el, {
      x: "+=" + driftX, y: "+=" + driftY,
      rotation: rotDrift,
      duration: speed, ease: "sine.inOut"
    }, emphasisStart3);
  });

  // Title breathing motion (calm recipe: gentle scale oscillation)
  var breathCount = Math.floor(emphasisDuration3 / 4) - 1;
  phase3.to(".title-settled", {
    scale: 1.008, duration: 2, ease: "sine.inOut",
    yoyo: true, repeat: breathCount
  }, emphasisStart3);

  // Subtle title glow breathing (Principle 8: Secondary Action reinforces calm)
  phase3.to(".title-settled", {
    textShadow: "0 0 50px rgba(180,30,30,0.4), 0 0 100px rgba(180,30,30,0.15)",
    duration: 3, ease: "sine.inOut",
    yoyo: true, repeat: Math.floor(emphasisDuration3 / 6) - 1
  }, emphasisStart3);

  // Subtitle gentle drift (Principle 5: Follow-through on secondary elements)
  phase3.to(".subtitle", {
    y: -3, duration: emphasisDuration3, ease: "sine.inOut"
  }, emphasisStart3);

  // Very slow vignette breathing (atmospheric ambiance)
  phase3.to(".dark-overlay", {
    opacity: 0.15, duration: 4, ease: "sine.inOut",
    yoyo: true, repeat: 1
  }, emphasisStart3 + 2);

  // --- Phase 3 Exit: Fade Recede (17s - 20s) ---
  // Calm exit: opacity + slight scale down, elements sink back
  // Principle 5 (Follow-through): staggered finish times
  var exitStart3 = 17;
  var exitDuration3 = 3;

  // Debris slowly recedes
  phase3.to(".debris", {
    opacity: 0, scale: 0.95, y: "+=10",
    duration: exitDuration3, ease: "sine.inOut",
    stagger: 0.08
  }, exitStart3);

  // Title slowly fades (Principle 12: Appeal — matches aftermath tone)
  phase3.to(".title-settled", {
    opacity: 0, scale: 0.97, y: 5,
    duration: exitDuration3, ease: "sine.inOut"
  }, exitStart3);

  // Subtitle fades last (Principle 3: Staging — last thing the eye sees)
  phase3.to(".subtitle", {
    opacity: 0, y: 5,
    duration: exitDuration3 * 0.8, ease: "sine.inOut"
  }, exitStart3 + 0.5);

  // Final darkness
  phase3.to(".dark-overlay", {
    opacity: 0.9, duration: exitDuration3, ease: "sine.inOut"
  }, exitStart3);

  // Add Phase 3 to master at overlap position
  tl.add(phase3, phase3Start);

</script>
</body>
</html>
