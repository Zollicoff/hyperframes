<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyperFrames Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background-color: #0a0a0f; /* Black canvas */
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        position: relative;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  </head>
  <body>
    <div
      id="root-comp"
      data-composition-id="promo-video"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="14.72"
    >
      <!-- The audio track -->
      <audio
        id="main-audio"
        src="https://gen-os-static.s3.us-east-2.amazonaws.com/astral_assets/uploaded_assets/67cf5a05_e134ec83a57042b38776c952da595870.mp4"
        data-start="0"
        data-track-index="0"
      ></audio>

      <div
        id="graphics-layer"
        data-composition-id="main-graphics"
        data-composition-src="compositions/main-graphics.html"
        data-start="0"
        data-track-index="1"
      ></div>

      <script>
        const tl = gsap.timeline({ paused: true });
        window.__timelines = window.__timelines || {};
        window.__timelines["promo-video"] = tl;
      </script>
    </div>
  </body>
</html>
